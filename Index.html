<!DOCTYPE html>
<html>
<head>
<title>Labour Booking - Login</title>
<style>
    body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid gray;
border-radius:5px;
}

button{
background:#ffcc00;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ffaa00;
}

</style>
</head>
<body>
    <div class="login-box">
        <h2><b>Labour Booking Login</b></h2>
        <form action="Project.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
