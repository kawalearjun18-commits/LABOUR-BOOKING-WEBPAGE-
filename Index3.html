<!DOCTYPE html>
<html>
<head>
<title>Complete Booking</title>
<style>
    body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input, select, textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
background:#ffcc00;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ffaa00;
}

</style>
</head>

<body>

<div class="container">

<h2>Complete Your Booking</h2>

<form>
    <label>Select Date</label>
    <input type="date">
    <label>Select Time</label>
    <input type="time">
    <label>Select Payment Method</label>
    <select>
        <option>Cash</option>
        <option>UPI</option>
        <option>Card</option>
    </select>
    <label>Work Address</label>
    <input type="text" placeholder="Enter your address">
    <label>Feedback / Special Instructions</label>
    <input type="text" placeholder="Any Instructions">
    <button>Confirm Booking</button>
</form>
</div>
</body>
</html>
